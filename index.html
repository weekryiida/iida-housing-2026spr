<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>あなたにぴったりの家づくりタイプ診断 | 週刊いいだ 住宅特集</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: #333333;
      background-color: #ffffff;
      line-height: 1.6;
    }
    
    .container {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    
    /* ヘッダー */
    header {
      background: linear-gradient(135deg, #f8f9f9 0%, #f0f2f5 100%);
      border-bottom: 1px solid #e0e0e0;
      padding: 40px 20px;
      text-align: center;
    }
    
    .header-content {
      max-width: 600px;
      margin: 0 auto;
    }
    
    header h1 {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 10px;
      color: #1a1a1a;
    }
    
    header p {
      font-size: 13px;
      color: #666666;
      font-weight: 400;
    }
    
    /* メインコンテンツ */
    main {
      flex: 1;
      max-width: 600px;
      width: 100%;
      margin: 0 auto;
      padding: 40px 20px;
    }
    
    .section {
      animation: fadeIn 0.4s ease-in;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    
    .section.hidden {
      display: none;
    }
    
    /* イントロセクション */
    .hero-box {
      margin-bottom: 40px;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      background: white;
    }
    
    .hero-box svg {
      width: 100%;
      height: auto;
      display: block;
    }
    
    .hero-carousel {
      position: relative;
      overflow: hidden;
    }
    
    .carousel-controls {
      position: absolute;
      bottom: 15px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 8px;
      z-index: 10;
    }
    
    .carousel-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background-color: rgba(255,255,255,0.5);
      cursor: pointer;
      transition: background-color 0.3s;
    }
    
    .carousel-dot.active {
      background-color: #ffffff;
    }
    
    .intro-text {
      margin-bottom: 40px;
    }
    
    .intro-text p {
      font-size: 15px;
      line-height: 1.8;
      color: #555555;
      margin-bottom: 16px;
    }
    
    /* ボタン */
    .btn {
      padding: 16px;
      font-size: 16px;
      font-weight: 600;
      color: #ffffff;
      background-color: #2d5016;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background-color 0.3s;
      width: 100%;
    }
    
    .btn:hover {
      background-color: #1f3a0d;
    }
    
    .btn-secondary {
      background-color: #f0f0f0;
      color: #666666;
      margin-top: 16px;
      font-weight: 500;
    }
    
    .btn-secondary:hover {
      background-color: #e8e8e8;
    }
    
    /* 進捗バー */
    .progress-bar {
      width: 100%;
      height: 4px;
      background-color: #e0e0e0;
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 12px;
    }
    
    .progress-fill {
      height: 100%;
      background-color: #2d5016;
      transition: width 0.3s ease;
    }
    
    .progress-text {
      font-size: 13px;
      color: #999999;
      margin-bottom: 24px;
      text-align: center;
    }
    
    /* 質問ボックス */
    .question-box {
      margin-bottom: 32px;
      padding: 24px;
      background-color: #f9f9f9;
      border-radius: 12px;
      border: 1px solid #e8e8e8;
    }
    
    .question-box h2 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 20px;
      color: #1a1a1a;
    }
    
    .options-container {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    
    .option-btn {
      padding: 14px 16px;
      font-size: 15px;
      font-weight: 500;
      color: #555555;
      background-color: #ffffff;
      border: 1px solid #d0d0d0;
      border-radius: 8px;
      cursor: pointer;
      text-align: left;
      transition: all 0.2s;
    }
    
    .option-btn:hover {
      border-color: #2d5016;
      background-color: #f8faf7;
    }
    
    .option-btn.selected {
      background-color: #2d5016;
      color: #ffffff;
      border-color: #2d5016;
    }
    
    /* 結果ボックス */
    .result-box {
      padding: 32px 24px;
      background-color: #f5f7f5;
      border-radius: 12px;
      border: 1px solid #d8e0d8;
      margin-bottom: 40px;
      text-align: center;
    }
    
    .result-label {
      font-size: 13px;
      color: #888888;
      margin-bottom: 12px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    
    .result-title {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 16px;
      color: #2d5016;
    }
    
    .result-description {
      font-size: 15px;
      color: #666666;
      line-height: 1.6;
    }
    
    /* スポンサー企業リスト */
    .sponsors-section {
      margin-bottom: 40px;
    }
    
    .sponsors-section h3 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 20px;
      color: #1a1a1a;
    }
    
    .sponsors-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    
    .sponsors-recommended {
      margin-bottom: 40px;
    }
    
    .sponsors-other {
      background-color: #f9f9f9;
      padding: 24px;
      border-radius: 8px;
      border: 1px solid #e8e8e8;
    }
    
    .sponsors-other-label {
      font-size: 12px;
      color: #999999;
      margin: 0 0 16px 0;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    
    .sponsors-other-list {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    
    @media (max-width: 640px) {
      .sponsors-other-list {
        grid-template-columns: 1fr;
      }
    }
    
    .sponsor-card {
      padding: 16px;
      background-color: #ffffff;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: all 0.2s;
    }
    
    .sponsor-card:hover {
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    
    .sponsor-card.primary {
      border: 2px solid #2d5016;
      background-color: #fafbf8;
    }
    
    .sponsor-card.other {
      padding: 12px;
      border: 0.5px solid #d8d8d8;
      background-color: transparent;
      flex-direction: column;
      align-items: flex-start;
    }
    
    .sponsor-card.other:hover {
      background-color: #f5f5f5;
      box-shadow: none;
    }
    
    .sponsor-content {
      flex: 1;
    }
    
    .sponsor-name {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 6px;
      color: #1a1a1a;
    }
    
    .sponsor-badge {
      display: inline-block;
      font-size: 11px;
      font-weight: 600;
      color: #ffffff;
      background-color: #2d5016;
      padding: 4px 10px;
      border-radius: 4px;
    }
    
    .sponsor-link {
      padding: 8px 14px;
      font-size: 13px;
      font-weight: 600;
      color: #2d5016;
      background-color: transparent;
      border: 1px solid #2d5016;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
      margin-left: 12px;
      white-space: nowrap;
      text-decoration: none;
    }
    
    .sponsor-link:hover {
      background-color: #f0f5f0;
    }
    
    .sponsor-link.other {
      padding: 6px 10px;
      font-size: 12px;
      border: 0.5px solid #ccc;
      color: #666666;
      background-color: transparent;
      margin-left: 0;
      margin-top: 8px;
    }
    
    .sponsor-link.other:hover {
      background-color: #e8e8e8;
    }
    
    /* フッター */
    footer {
      border-top: 1px solid #e0e0e0;
      padding: 24px 20px;
      text-align: center;
      background-color: #f9f9f9;
    }
    
    footer p {
      font-size: 13px;
      color: #999999;
      margin: 0;
    }
    
    /* レスポンシブ */
    @media (max-width: 640px) {
      header h1 {
        font-size: 24px;
      }
      
      .sponsor-card {
        flex-direction: column;
        align-items: flex-start;
      }
      
      .sponsor-link {
        margin-left: 0;
        margin-top: 12px;
        width: 100%;
        text-align: center;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="header-content">
        <h1>あなたにぴったりの家づくりタイプ診断</h1>
        <p>週刊いいだ 住宅特集 presented by 飯田の家づくりパートナー</p>
      </div>
    </header>
 
    <main>

        </div>
 
        <div class="intro-text">
          <p>住宅購入は人生で最大の決断の一つ。このちょっとした診断を通じて、あなたにぴったりな家づくりのアプローチが見つかります。</p>
          <p>5つの質問にお答えいただくだけで、あなたの理想の家づくりをサポートしてくれるパートナーをご紹介します。</p>
        </div>
 
        <button class="btn" onclick="goToQuiz()">診断をはじめる</button>
      </div>
 
      <!-- クイズセクション -->
      <div id="quiz" class="section hidden">
        <div class="progress-bar">
          <div id="progressFill" class="progress-fill" style="width: 0%"></div>
        </div>
        <p class="progress-text">問 <span id="questionNum">1</span> / 5</p>
 
        <div id="questionsContainer"></div>
 
        <button id="nextBtn" class="btn" style="display: none; margin-top: 30px;" onclick="goToResult()">診断結果を見る →</button>
        <button class="btn btn-secondary" onclick="goToIntro()">最初に戻る</button>
      </div>
 
      <!-- 結果セクション -->
      <div id="result" class="section hidden">
        <div class="result-box">
          <p class="result-label">あなたのタイプ</p>
          <h2 id="resultTitle" class="result-title"></h2>
          <p class="result-description">あなたのタイプに合った企業を優先的にご紹介します。ぜひ、各企業の詳細情報をチェックしてみてください。</p>
        </div>
 
        <div class="sponsors-section">
          <h3>パートナー企業一覧</h3>
          <div id="sponsorsRecommended" class="sponsors-list sponsors-recommended"></div>
          <div id="sponsorsOther" class="sponsors-other">
            <p class="sponsors-other-label">週刊いいだ 住宅特集 スポンサー一覧</p>
            <div id="sponsorsOtherList" class="sponsors-list sponsors-other-list"></div>
          </div>
        </div>
 
        <button class="btn btn-secondary" onclick="resetDiagnosis()">診断を再度実行</button>
      </div>
    </main>
 
    <footer>
      <p>週刊いいだ × 飯田地域住宅・不動産パートナー</p>
    </footer>
  </div>

20" width="80" height="80" fill="#ffc87d" opacity="0.15"/><circle cx="150" cy="380" r="45" fill="#8b9a7a" opacity="0.8"/><circle cx="700" cy="390" r="50" fill="#9aaa88" opacity="0.8"/><ellipse cx="280" cy="460" rx="35" ry="25" fill="#7a8a6a" opacity="0.7"/><ellipse cx="650" cy="470" rx="40" ry="28" fill="#8b9b7a" opacity="0.7"/>`,
      
      // 画像3: モダンミニマル
      `<defs><linearGradient id="sky3" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" style="stop-color:#d4e8f0;stop-opacity:1" /><stop offset="100%" style="stop-color:#e8f4f8;stop-opacity:1" /></linearGradient><linearGradient id="softLight3" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.2" /><stop offset="50%" style="stop-color:#ffffff;stop-opacity:0" /><stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.15" /></linearGradient></defs><rect width="800" height="600" fill="url(#sky3)"/><path d="M 0 280 Q 200 200, 400 220 T 800 280 L 800 600 L 0 600 Z" fill="#b8c4a8" opacity="0.4"/><rect width="800" height="600" fill="url(#softLight3)"/><rect x="0" y="420" width="800" height="180" fill="#d0c4b0"/><ellipse cx="180" cy="500" rx="140" ry="50" fill="#a4b890" opacity="0.6"/><ellipse cx="680" cy="510" rx="120" ry="45" fill="#b4c8a0" opacity="0.6"/><rect x="260" y="260" width="280" height="170" fill="#f0ebe0" stroke="#c0b8a8" stroke-width="2"/><rect x="260" y="240" width="280" height="25" fill="#6b5a47" opacity="0.9"/><polygon points="260,240 400,190 540,240" fill="#8b7a67" stroke="#5a4a3a" stroke-width="1.5"/><rect x="250" y="430" width="300" height="25" fill="#e0d8cc" stroke="#b8b0a0" stroke-width="1.5"/><rect x="290" y="300" width="110" height="70" fill="#a8d8e8" stroke="#5a7a8c" stroke-width="2"/><line x1="345" y1="300" x2="345" y2="370" stroke="#5a7a8c" stroke-width="1.5"/><line x1="290" y1="335" x2="400" y2="335" stroke="#5a7a8c" stroke-width="1.5"/><rect x="440" y="310" width="90" height="60" fill="#a8d8e8" stroke="#5a7a8c" stroke-width="2"/><line x1="485" y1="310" x2="485" y2="370" stroke="#5a7a8c" stroke-width="1.5"/><line x1="440" y1="340" x2="530" y2="340" stroke="#5a7a8c" stroke-width="1.5"/><rect x="405" y="370" width="50" height="80" fill="#8b7a6a" stroke="#4a3a2a" stroke-width="2"/><circle cx="450" cy="410" r="3" fill="#c8a882"/><rect x="240" y="400" width="320" height="35" fill="#d4b8a0" stroke="#a89870" stroke-width="1.5"/><circle cx="250" cy="430" r="25" fill="#7a9e6f" opacity="0.7"/><circle cx="720" cy="445" r="30" fill="#8aae7f" opacity="0.7"/><ellipse cx="310" cy="460" rx="28" ry="20" fill="#6a8e5f" opacity="0.6"/><ellipse cx="630" cy="475" rx="32" ry="22" fill="#7a9e6f" opacity="0.6"/>`
    ];
 
    let answers = {};
 
    // 初期化
    function init() {
      // 初期化処理
    }
 
    // ページ遷移
    function goToQuiz() {
      document.getElementById('intro').classList.add('hidden');
      document.getElementById('quiz').classList.remove('hidden');
      renderQuestions();
    }
 
    function goToIntro() {
      document.getElementById('quiz').classList.add('hidden');
      document.getElementById('result').classList.add('hidden');
      document.getElementById('intro').classList.remove('hidden');
      answers = {};
    }
 
    // 質問レンダリング
    function renderQuestions() {
      const container = document.getElementById('questionsContainer');
      container.innerHTML = '';
      
      const nextQuestion = questions.find(q => !answers[q.id]);
      if (nextQuestion) {
        const qBox = document.createElement('div');
        qBox.className = 'question-box';
        qBox.innerHTML = `
          <h2>${nextQuestion.title}</h2>
          <div class="options-container">
            ${nextQuestion.options.map(opt => `
              <button class="option-btn" onclick="selectAnswer('${nextQuestion.id}', '${opt.value}')">${opt.label}</button>
            `).join('')}
          </div>
        `;
        container.appendChild(qBox);
      }
      
      const answered = Object.keys(answers).length;
      document.getElementById('questionNum').textContent = answered + 1;
      document.getElementById('progressFill').style.width = (answered / 5) * 100 + '%';
      document.getElementById('nextBtn').style.display = answered === 5 ? 'block' : 'none';
    }
 
    // 回答保存
    function selectAnswer(qId, value) {
      answers[qId] = value;
      renderQuestions();
    }
 
    // 診断結果ロジック
    function getResultType() {
      // Q1が最優先
      if (answers.q1 === 'budget') {
        return 'まずは資金計画・ローン相談';
      } else if (answers.q1 === 'land') {
        return 'まずは土地探し';
      } else if (answers.q1 === 'exterior') {
        return 'まずは庭や外構を整えたい';
      } else if (answers.q1 === 'design') {
        return 'まずはハウスメーカー・工務店に相談';
      }
      // Q5も考慮（補助的）
      if (answers.q5 === 'soon') {
        return 'まずは資金計画・ローン相談';
      }
      return 'まずはハウスメーカー・工務店に相談';
    }
 
    // ソート済みスポンサー取得
    function getSortedSponsors(resultType) {
      const categoryMap = {
        'まずは資金計画・ローン相談': '金融系',
        'まずは土地探し': '土地探し',
        'まずはハウスメーカー・工務店に相談': 'ハウスメーカー・工務店',
        'まずは庭や外構を整えたい': '外構'
      };
      
      const allSponsors = [];
      const primaryCat = categoryMap[resultType];
      
      if (sponsors[primaryCat]) {
        sponsors[primaryCat].forEach(s => allSponsors.push({ ...s, isPrimary: true }));
      }
      
      Object.keys(sponsors).forEach(cat => {
        if (cat !== primaryCat) {
          sponsors[cat].forEach(s => allSponsors.push({ ...s, isPrimary: false }));
        }
      });
      
      return allSponsors;
    }
 
    // 結果表示
    function goToResult() {
      const resultType = getResultType();
      const sorted = getSortedSponsors(resultType);
      
      // 推奨企業とその他を分割
      const recommended = sorted.filter(s => s.isPrimary);
      const others = sorted.filter(s => !s.isPrimary);
      
      document.getElementById('quiz').classList.add('hidden');
      document.getElementById('result').classList.remove('hidden');
      document.getElementById('resultTitle').textContent = resultType;
      
      // 推奨企業（該当カテゴリ）
      const recList = document.getElementById('sponsorsRecommended');
      recList.innerHTML = recommended.map(s => `
        <div class="sponsor-card primary">
          <div class="sponsor-content">
            <p class="sponsor-name">${s.name}</p>
            <span class="sponsor-badge">おすすめ</span>
          </div>
          <a class="sponsor-link" 
             href="${s.url}" 
             target="_blank"
             onclick="gtag('event', '${s.name}', {'type': 'recommended'})">
            詳細を見る →
          </a>
        </div>
      `).join('');
      
      // その他企業
      const otherList = document.getElementById('sponsorsOtherList');
      otherList.innerHTML = others.map(s => `
        <div class="sponsor-card other">
          <p class="sponsor-name" style="margin-bottom: 8px;">${s.name}</p>
          <a class="sponsor-link other" 
             href="${s.url}" 
             target="_blank"
             onclick="gtag('event', '${s.name}', {'type': 'other'})">
            詳細
          </a>
        </div>
      `).join('');
    }
 
    // リセット
    function resetDiagnosis() {
      answers = {};
      goToIntro();
    }
 
    // 初期化
    init();
  </script>
</body>
</html>
